name: 'Build GitLab CI container (Release)'

on:
  schedule:
    - cron: "4 3 * * 5"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-gitlab:
    if: ${{ github.repository == 'domjudge/domjudge-packaging' }}
    name: Build GitLab image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use the same PHP config as the contributor containers
        run: cp -r docker-{contributor,gitlabci}/php-config

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gitlabci

      - name: Building an example chroot
        run: docker-gitlabci/build_ci_chroot.sh

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: "./docker-gitlabci" 
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/gitlabci:24.04"
          labels: ${{ steps.meta.outputs.labels }}

